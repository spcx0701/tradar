services:
  - type: web
    name: tradar
    runtime: python
    repo: https://github.com/spcx0701/tradar
    plan: free
    region: singapore
    branch: main
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: TW_CORS
        value: https://spcx0701.github.io,https://tradar.onrender.com
      - key: DATA_GO_KR_KEY
        sync: false
      - key: TW_LLM_PROVIDER
        value: openrouter-solar-free
      - key: TW_LLM_MODEL
        value: solar-pro3
      - key: TW_LLM_BASE_URL
        value: https://api.upstage.ai/v1
      - key: TW_LLM_KEY
        sync: false
      - key: TW_OPENROUTER_MODEL
        value: upstage/solar-pro-3:free
      - key: TW_OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: TW_OPENROUTER_KEY
        sync: false
      - key: TW_GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: TW_GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: TW_GROQ_KEY
        sync: false
      - key: TW_GEMINI_MODEL
        value: gemini-3.5-flash
      - key: TW_GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: TW_GEMINI_KEY
        sync: false
      - key: TW_ADMIN_TOKEN
        sync: false
