name: Bug report
description: Report a reproducible problem in Tradar.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Tradar. Do not include secrets, API keys, private data, or exploitable vulnerability details in public issues. Use GitHub Security Advisory for security-sensitive reports.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web/PWA
        - FastAPI server
        - Data pipeline
        - AI advisor/report studio
        - Android packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Python version, Android version, or deployment URL if relevant.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact tokens, keys, private data, and sensitive business information.
      render: shell
