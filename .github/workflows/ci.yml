name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: pytest, lint, coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install
        run: python -m pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check server scripts
      - name: Rebuild data (deterministic)
        run: |
          python scripts/generate_snapshot.py
          python scripts/build_app_data.py
      - name: Tests
        run: pytest -q --cov=server --cov=scripts --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          use_oidc: true
          slug: spcx0701/tradar
          files: ./coverage.xml
          fail_ci_if_error: true

  android:
    name: Android unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Android unit tests
        working-directory: packaging/android
        run: ./gradlew :app:testDebugUnitTest

  zap-baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: Start Tradar app
        run: |
          python -m uvicorn server.main:app --host 0.0.0.0 --port 5183 > uvicorn.log 2>&1 &
          echo "$!" > uvicorn.pid
      - name: Wait for scan target
        run: |
          python - <<'PY'
          import time
          from urllib.error import HTTPError, URLError
          from urllib.request import urlopen

          url = "http://127.0.0.1:5183/"
          last_error = None
          for _ in range(30):
              try:
                  with urlopen(url, timeout=2) as response:
                      if 200 <= response.status < 300:
                          print(f"Ready: {url}")
                          raise SystemExit(0)
                      last_error = f"HTTP {response.status}"
              except (HTTPError, URLError, TimeoutError) as exc:
                  last_error = repr(exc)
              time.sleep(1)
          raise SystemExit(f"Target did not become ready: {url} ({last_error})")
          PY
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
        with:
          target: http://127.0.0.1:5183/
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-baseline-tradar
      - name: Add ZAP report summary
        if: always()
        run: |
          if [ -f report_md.md ]; then
            cat report_md.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ZAP markdown report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Show server log on failure
        if: failure()
        run: cat uvicorn.log || true

  pages:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions: { contents: write }
    environment: { name: github-pages, url: "https://spcx0701.github.io/tradar/" }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Tradar 플랫폼 정적 배포 — app/(원본 디자인 + data/tradar.js) 그대로 업로드.
      # DATA_GO_KR_KEY secret이 있으면 배포 직전에 공식 HS 통계 + 공개 B/L 흐름을 다시 굽는다.
      - name: Refresh trade intelligence payload
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          TRADE_INTEL_PUBLIC_BL_CSV: server/data/public_bl_sample.csv
          TRADE_INTEL_CUSTOMS_TIMEOUT: "8"
          TRADE_INTEL_CUSTOMS_MARKET_LIMIT: "3"
        run: |
          if [ -n "$DATA_GO_KR_KEY" ]; then
            python scripts/sync_trade_intel.py
          else
            echo "DATA_GO_KR_KEY secret is not set; using committed trade intelligence payload."
          fi
          python scripts/audit_trade_intel.py --max-age-hours 72
      - name: Write static API config
        env:
          TRADEWIND_API_BASE: ${{ vars.TRADEWIND_API_BASE }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          api_base = os.environ.get("TRADEWIND_API_BASE", "").rstrip("/")
          Path("app/data/api-config.js").write_text(
              "window.TRADAR_API_BASE = " + json.dumps(api_base, ensure_ascii=False) + ";\n",
              encoding="utf-8",
          )
          print(f"wrote app/data/api-config.js for {api_base or 'local fallback'}")
          PY
      - name: Publish static app to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          publish_dir="$(mktemp -d)"
          cp -R app/. "$publish_dir"/
          touch "$publish_dir/.nojekyll"
          git -C "$publish_dir" init
          git -C "$publish_dir" checkout -b gh-pages
          git -C "$publish_dir" config user.name "github-actions[bot]"
          git -C "$publish_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$publish_dir" add .
          git -C "$publish_dir" commit -m "Deploy Tradar ${GITHUB_SHA}"
          git -C "$publish_dir" remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "$publish_dir" push --force origin gh-pages
