name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: pytest, lint, coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install
        run: python -m pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check server scripts
      - name: Rebuild data (deterministic)
        run: |
          python scripts/generate_snapshot.py
          python scripts/build_app_data.py
      - name: Tests
        run: pytest -q --cov=server --cov=scripts --cov-report=xml
  zap-baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: Start Tradar app
        run: |
          python -m uvicorn server.main:app --host 0.0.0.0 --port 5183 > uvicorn.log 2>&1 &
          echo "$!" > uvicorn.pid
      - name: Wait for scan target
        run: |
          python - <<'PY'
          import time
          from urllib.error import HTTPError, URLError
          from urllib.request import urlopen

          url = "http://127.0.0.1:5183/"
          last_error = None
          for _ in range(30):
              try:
                  with urlopen(url, timeout=2) as response:
                      if 200 <= response.status < 300:
                          print(f"Ready: {url}")
                          raise SystemExit(0)
                      last_error = f"HTTP {response.status}"
              except (HTTPError, URLError, TimeoutError) as exc:
                  last_error = repr(exc)
              time.sleep(1)
          raise SystemExit(f"Target did not become ready: {url} ({last_error})")
          PY
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
        with:
          target: http://127.0.0.1:5183/
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-baseline-tradar
      - name: Add ZAP report summary
        if: always()
        run: |
          if [ -f report_md.md ]; then
            cat report_md.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ZAP markdown report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Show server log on failure
        if: failure()
        run: cat uvicorn.log || true

  pages:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions: { pages: write, id-token: write, contents: read }
    environment: { name: github-pages, url: "${{ steps.deploy.outputs.page_url }}" }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # Tradar 플랫폼 정적 배포 — app/(원본 디자인 + data/tradar.js) 그대로 업로드.
      # 관세청 실데이터 갱신은 로컬/배치에서 scripts/build_tradar_data.py 로 수행(DATA_GO_KR_KEY).
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with: { path: app }
      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
