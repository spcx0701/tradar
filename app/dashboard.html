<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tradar B2G 관제 콘솔 — 한류 수출 동향</title>
<meta name="theme-color" content="#191c22">
<link rel="icon" href="icons/logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block">
<link rel="stylesheet" href="tradar.css">
<style>
  body{overflow-y:auto;height:auto}
  .dw{max-width:1280px;margin:0 auto;padding:0 24px}
  .dtop{background:var(--tdr-side);color:#fff;height:60px;display:flex;align-items:center}
  .dtop .dw{display:flex;align-items:center;gap:12px;width:100%}
  .dtop .mark{width:28px;height:28px;border-radius:8px;background:var(--cm-grad);display:grid;place-items:center;color:#fff}
  .dtop b{font-size:16px;font-weight:800} .dtop small{color:#9ba3af;font-size:11px;display:block}
  table.heat{width:100%;border-collapse:collapse;font-size:11.5px}
  table.heat th{color:var(--cm-ink-3);font-weight:600;padding:5px 4px;text-align:center}
  table.heat th.row{text-align:left;white-space:nowrap;color:var(--cm-ink-2)}
  table.heat td{text-align:center;padding:3px}
  .cell{display:block;border-radius:6px;padding:7px 0;font-weight:700;color:#0C0D11;font-variant-numeric:tabular-nums}
  .barrow{display:grid;grid-template-columns:130px 1fr 92px;align-items:center;gap:10px;font-size:12.5px;padding:5px 0}
  .barrow .bar{height:9px;border-radius:5px;background:var(--cm-accent)} .barrow .val{text-align:right;font-variant-numeric:tabular-nums;color:var(--cm-ink-2)}
  @media(max-width:900px){.g-32{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="dtop"><div class="dw">
  <span class="mark"><span class="ms">radar</span></span>
  <div><b>Tradar B2G 관제 콘솔</b><small>관세청·KOTRA·지자체 수출지원 — 한류 수출 동향 관제 (공공 환류)</small></div>
  <div style="flex:1"></div><span class="tag" id="period">관세청 수출입통계</span>
</div></div>

<div class="dw" style="padding-top:22px;padding-bottom:34px">
  <div class="grid g-4" id="kpis" style="margin-bottom:16px"></div>
  <div class="grid g-32">
    <div>
      <div class="card"><div class="card-h"><span class="overline">품목 × 시장 · Tradar Score 히트맵</span></div><div class="card-b" id="heat"></div></div>
      <div class="card mt"><div class="card-h"><span class="overline">국가별 최근 12개월 수출 비중</span></div><div class="card-b" id="bars"></div></div>
    </div>
    <div>
      <div class="card"><div class="card-h"><span class="overline">급등 시장 TOP 10</span></div><div class="card-b" style="padding:8px" id="surge"></div></div>
      <div class="card mt" style="border-color:#fecaca"><div class="card-h"><span class="overline">둔화 리스크 경보</span></div><div class="card-b" style="padding:8px" id="risk"></div></div>
    </div>
  </div>
  <p class="muted" style="font-size:11.5px;margin-top:12px">데이터 출처: 관세청 품목별 국가별 수출입실적(공공데이터포털) · Tradar Score·예측은 자체 국산 AI 산출 · 익명·집계 데이터만 표출(개인·기업 식별정보 없음).</p>
</div>

<script>
const flag=cc=>cc&&cc.length===2?String.fromCodePoint(...[...cc.toUpperCase()].map(c=>0x1f1e6+c.charCodeAt(0)-65)):'🏳️';
const usd=v=>{v=+v||0;return v>=1e8?(v/1e8).toFixed(1)+'억$':v>=1e6?(v/1e6).toFixed(0)+'백만$':(v/1e3).toFixed(0)+'천$';};
const pct=v=>(v*100>=0?'+':'')+(v*100).toFixed(0)+'%';
const heat=s=>{const t=Math.max(0,Math.min(1,(s-45)/45));const r=Math.round(225+(29-225)*t),g=Math.round(233+(104-233)*t),b=Math.round(245+(240-245)*t);return `rgb(${r},${g},${b})`;};
(async()=>{
  const [cat,radar,countries,tm]=await Promise.all(['catalog','radar','countries','treemap'].map(n=>fetch('data/'+n+'.json').then(r=>r.json())));
  const cname=cc=>cat.countries[cc]||cc;
  document.getElementById('period').textContent='분석기간 '+cat.meta.period;
  const total=countries.countries.reduce((a,c)=>a+c.latest12_usd,0);
  const wYoy=cat.products.reduce((a,p)=>a+p.yoy*p.latest12_usd,0)/cat.products.reduce((a,p)=>a+p.latest12_usd,0);
  const avg=Math.round(tm.leaves.reduce((a,l)=>a+l.score,0)/tm.leaves.length);
  const kpi=[['database','분석 수출액(12M)',usd(total),''],['trending_up','전년 대비 가중',pct(wYoy),wYoy>0?'up':'down'],
    ['speed','평균 Tradar Score',avg,''],['warning','둔화 경보',radar.risk.length+'곳','down']];
  document.getElementById('kpis').innerHTML=kpi.map(k=>`<div class="stat"><div class="lbl"><span class="ms">${k[0]}</span>${k[1]}</div><div class="val num" style="color:${k[3]==='down'?'var(--cm-neg)':k[3]==='up'?'var(--cm-pos)':'inherit'}">${k[2]}</div></div>`).join('');
  // heatmap 품목×상위국
  const freq={}; tm.leaves.forEach(l=>freq[l.country]=(freq[l.country]||0)+l.value);
  const cols=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,10).map(e=>e[0]);
  const byc={}; tm.leaves.forEach(l=>{(byc[l.hs]??={})[l.country]=l;});
  let h='<table class="heat"><tr><th class="row">품목 \\ 시장</th>'+cols.map(c=>`<th>${flag(c)}<br>${cname(c)}</th>`).join('')+'</tr>';
  cat.products.forEach(p=>{h+=`<tr><th class="row">${p.name_ko}</th>`+cols.map(c=>{const m=byc[p.hs]&&byc[p.hs][c];return m?`<td><span class="cell" style="background:${heat(m.score)}">${Math.round(m.score)}</span></td>`:'<td><span class="cell" style="background:#F1F5F9;color:#CBD2DC">·</span></td>';}).join('')+'</tr>';});
  document.getElementById('heat').innerHTML=h+'</table>';
  const mx=Math.max(...countries.countries.map(c=>c.latest12_usd));
  document.getElementById('bars').innerHTML=countries.countries.slice(0,12).map(c=>`<div class="barrow"><span>${flag(c.country)} ${c.country_name}</span><span class="bar" style="width:${(c.latest12_usd/mx*100).toFixed(0)}%"></span><span class="val">${usd(c.latest12_usd)} <b style="color:${c.yoy>0?'var(--cm-pos)':'var(--cm-neg)'}">${pct(c.yoy)}</b></span></div>`).join('');
  document.getElementById('surge').innerHTML=radar.top.slice(0,10).map((m,i)=>`<div class="rrow"><span class="rank num">${i+1}</span><span class="flag">${flag(m.country)}</span><div class="body"><div class="t">${cname(m.country)} · ${m.product}</div></div><b class="num" style="color:var(--cm-pos)">${Math.round(m.score)}</b></div>`).join('');
  document.getElementById('risk').innerHTML=radar.risk.slice(0,8).map(m=>`<div class="rrow"><span class="flag">${flag(m.country)}</span><div class="body"><div class="t">${cname(m.country)} · ${m.product}</div></div><b class="num" style="color:var(--cm-neg)">${pct(m.growth3)}</b></div>`).join('');
})();
</script>
</body>
</html>
