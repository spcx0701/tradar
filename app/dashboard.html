<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>무역풍 B2G 관제 콘솔 — 한류 수출 동향</title>
<meta name="theme-color" content="#0a2540">
<link rel="icon" href="icons/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="app.css">
<style>
  body { padding-bottom: 0; background: #edf2f9; }
  .dwrap { max-width: 1240px; margin: 0 auto; padding: 0 22px; }
  .console-top { background: var(--grad); color: #fff; padding: 16px 0; }
  .console-top .dwrap { display: flex; align-items: center; gap: 12px; }
  .kpis { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin: 22px 0; }
  .kpi { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 16px 18px; box-shadow: var(--shadow); }
  .kpi .v { font-size: 28px; font-weight: 800; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
  .kpi .l { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .kpi .v.up { color: var(--surge); } .kpi .v.down { color: var(--cooling); }
  .cols { display: grid; grid-template-columns: 1.55fr 1fr; gap: 16px; align-items: start; }
  .panel { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .panel h3 { font-size: 15px; margin: 0 0 12px; }
  table.heat { width: 100%; border-collapse: collapse; font-size: 11.5px; }
  table.heat th { color: var(--muted); font-weight: 600; padding: 4px 3px; text-align: center; }
  table.heat th.row { text-align: left; white-space: nowrap; }
  table.heat td { text-align: center; padding: 3px 2px; }
  .cell { display: block; border-radius: 6px; padding: 6px 0; font-weight: 700; color: #0f172a; font-variant-numeric: tabular-nums; }
  .rank { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line); }
  .rank:last-child { border-bottom: 0; }
  .rank .n { width: 20px; font-weight: 800; color: var(--blue); }
  .rank .nm { flex: 1; font-size: 13.5px; }
  .rank .nm small { color: var(--muted); }
  .rank .sc { font-weight: 800; font-variant-numeric: tabular-nums; }
  .bar { height: 9px; border-radius: 5px; background: var(--blue); }
  .barrow { display: grid; grid-template-columns: 120px 1fr 78px; align-items: center; gap: 10px; font-size: 12.5px; padding: 4px 0; }
  .barrow .lab { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .barrow .val { text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-2); }
  @media (max-width: 880px){ .kpis{grid-template-columns:1fr 1fr} .cols{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="console-top"><div class="dwrap">
  <img src="icons/logo.svg" style="width:30px;height:30px" alt="무역풍">
  <div><b style="font-size:18px">무역풍 B2G 관제 콘솔</b><br>
    <small style="opacity:.85">관세청·KOTRA·지자체 수출지원 — 한류 수출 동향 관제(공공 환류)</small></div>
  <div style="flex:1"></div>
  <span class="databadge" id="period">관세청 수출입통계</span>
</div></div>

<div class="dwrap">
  <div class="kpis" id="kpis"></div>
  <div class="cols">
    <div>
      <div class="panel"><h3>📊 한류 품목 × 시장 기회 히트맵 <small class="muted">(AI 기회점수, 100점 만점)</small></h3>
        <div id="heat"></div></div>
      <div class="panel"><h3>🌍 국가별 최근 12개월 수출 비중 <small class="muted">(분석 품목 합계)</small></h3>
        <div id="bars"></div></div>
    </div>
    <div>
      <div class="panel"><h3>🚀 급등 시장 TOP 10</h3><div id="surge"></div></div>
      <div class="panel" style="border-color:#fecaca"><h3>⚠️ 둔화 리스크 경보</h3><div id="risk"></div></div>
    </div>
  </div>
  <p class="src" style="margin:6px 0 30px">데이터 출처: 관세청 <b>품목별 국가별 수출입실적</b>(공공데이터포털) · 예측·기회점수는 무역풍 자체 국산 AI 산출 · 익명·집계 데이터만 표출(개인·기업 식별정보 없음).</p>
</div>

<script>
const flag = cc => cc&&cc.length===2 ? String.fromCodePoint(...[...cc.toUpperCase()].map(c=>0x1f1e6+c.charCodeAt(0)-65)) : '🏳️';
const usd = v => { v=+v||0; return v>=1e8?(v/1e8).toFixed(1)+'억$':v>=1e6?(v/1e6).toFixed(0)+'백만$':(v/1e3).toFixed(0)+'천$'; };
const pct = v => (v*100>=0?'+':'')+(v*100).toFixed(0)+'%';
const heatColor = s => { const t=Math.max(0,Math.min(1,(s-40)/45)); const r=Math.round(214+(18-214)*t),g=Math.round(229+(179-229)*t),b=Math.round(240+(166-240)*t); return `rgb(${r},${g},${b})`; };
(async()=>{
  const [cat,radar,countries,fc]=await Promise.all(['catalog','radar','countries','forecast'].map(n=>fetch('data/'+n+'.json').then(r=>r.json())));
  const cname = cc => cat.countries[cc]||cc;
  document.getElementById('period').textContent='분석기간 '+cat.meta.period;
  // KPI
  const totals = countries.countries.reduce((a,c)=>a+c.latest12_usd,0);
  const surgeN = radar.top.filter(t=>t.status==='surge').length;
  const wYoy = cat.products.reduce((a,p)=>a+p.yoy*p.latest12_usd,0)/cat.products.reduce((a,p)=>a+p.latest12_usd,0);
  const kpis=[['분석 수출액(최근12개월)',usd(totals),''],['전년 대비 가중 증감',pct(wYoy),wYoy>0?'up':'down'],
    ['급등 시장',surgeN+'곳','up'],['둔화 경보',radar.risk.length+'곳','down']];
  document.getElementById('kpis').innerHTML=kpis.map(k=>`<div class="kpi"><div class="v ${k[2]}">${k[1]}</div><div class="l">${k[0]}</div></div>`).join('');
  // 히트맵: 품목 × 상위 국가(빈도)
  const freq={}; cat.products.forEach(p=>radar.by_product[p.hs].forEach(m=>freq[m.country]=(freq[m.country]||0)+m.recent12_usd));
  const cols=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,10).map(e=>e[0]);
  let html='<table class="heat"><tr><th class="row">품목 \\ 시장</th>'+cols.map(c=>`<th>${flag(c)}<br>${cname(c)}</th>`).join('')+'</tr>';
  cat.products.forEach(p=>{ const byc={}; radar.by_product[p.hs].forEach(m=>byc[m.country]=m);
    html+=`<tr><th class="row">${p.name_ko}</th>`+cols.map(c=>{const m=byc[c];return m?`<td><span class="cell" style="background:${heatColor(m.opportunity)}">${Math.round(m.opportunity)}</span></td>`:'<td><span class="cell" style="background:#f1f5f9;color:#cbd5e1">·</span></td>';}).join('')+'</tr>';});
  html+='</table>'; document.getElementById('heat').innerHTML=html;
  // 국가별 바
  const mx=Math.max(...countries.countries.map(c=>c.latest12_usd));
  document.getElementById('bars').innerHTML=countries.countries.slice(0,12).map(c=>
    `<div class="barrow"><span class="lab">${flag(c.country)} ${c.country_name}</span><span class="bar" style="width:${(c.latest12_usd/mx*100).toFixed(0)}%"></span><span class="val">${usd(c.latest12_usd)} <b style="color:${c.yoy>0?'#16a34a':'#dc2626'}">${pct(c.yoy)}</b></span></div>`).join('');
  // 랭킹
  document.getElementById('surge').innerHTML=radar.top.slice(0,10).map((m,i)=>
    `<div class="rank"><span class="n">${i+1}</span><span class="nm">${flag(m.country)} ${cname(m.country)} <small>· ${m.product}</small></span><span class="sc" style="color:#16a34a">${Math.round(m.opportunity)}</span></div>`).join('');
  document.getElementById('risk').innerHTML=radar.risk.slice(0,8).map(m=>
    `<div class="rank"><span class="nm">${flag(m.country)} ${cname(m.country)} <small>· ${m.product}</small></span><span class="sc" style="color:#dc2626">${pct(m.growth3)}</span></div>`).join('');
})();
</script>
</body>
</html>
