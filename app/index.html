<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tradar — 수출 인텔리전스 플랫폼</title>
<meta name="description" content="관세청 수출입통계와 국산 AI로 한류 수출 시장을 스코어링하고, 떠오르는 시장을 먼저 포착하는 수출 인텔리전스 플랫폼.">
<meta name="theme-color" content="#191c22">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/logo.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block">
<link rel="stylesheet" href="tradar.css">
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="side">
    <div class="side-logo">
      <span class="mark"><span class="ms">radar</span></span>
      <div><b>Tradar</b><small>수출 인텔리전스</small></div>
    </div>
    <nav class="side-nav">
      <div class="side-sec">분석</div>
      <div class="nav-item active" data-view="command"><span class="ms">space_dashboard</span> 커맨드센터</div>
      <div class="nav-item" data-view="map"><span class="ms">grid_view</span> 마켓맵</div>
      <div class="nav-item" data-view="score"><span class="ms">insights</span> 스코어 분석</div>
      <div class="nav-item" data-view="discovery"><span class="ms">travel_explore</span> 디스커버리</div>
      <div class="side-sec">AI</div>
      <div class="nav-item" data-view="advisor"><span class="ms">auto_awesome</span> AI 무역참모</div>
      <div class="side-sec">내 작업</div>
      <div class="nav-item" data-view="watchlist"><span class="ms">bookmark</span> 워치리스트 <span class="badge-n" id="wl-count" style="display:none">0</span></div>
      <div class="nav-item" data-view="settings"><span class="ms">settings</span> 설정</div>
    </nav>
    <div class="side-foot">
      <div class="side-user">
        <span class="av"></span>
        <div><div class="nm">수출지원팀</div><div class="pl">Pro · 관세청 데이터</div></div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <div class="search" id="search-trigger">
        <span class="ms">search</span>
        <input id="search-fake" placeholder="품목·국가·시장 검색…" readonly>
        <kbd>⌘K</kbd>
      </div>
      <div class="sp"></div>
      <button class="iconbtn" id="btn-alerts" title="알림"><span class="ms">notifications</span></button>
      <button class="btn ghost" id="btn-share"><span class="ms">ios_share</span> 공유</button>
    </header>

    <main class="content" id="content">
      <section class="view active" id="view-command"></section>
      <section class="view" id="view-map"></section>
      <section class="view" id="view-score"></section>
      <section class="view" id="view-discovery"></section>
      <section class="view" id="view-advisor"></section>
      <section class="view" id="view-watchlist"></section>
      <section class="view" id="view-settings"></section>
    </main>
  </div>
</div>

<!-- Command palette -->
<div class="palette-scrim" id="pal-scrim"></div>
<div class="palette" id="pal">
  <div class="p-in"><span class="ms">search</span><input id="pal-input" placeholder="품목·국가로 이동, 또는 명령 실행…"></div>
  <div class="p-list" id="pal-list"></div>
</div>

<script src="vendor/echarts.min.js"></script>
<script src="app.js"></script>
</body>
</html>
